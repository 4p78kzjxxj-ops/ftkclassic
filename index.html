<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FTK Classic – Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="IMG_7296.jpg" />
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #1d4ed8;
      --accent-soft: #dbeafe;
      --accent-strong: #1e40af;
      --danger: #b91c1c;
      --danger-soft: #fee2e2;
      --shadow-soft: 0 18px 45px rgba(15,23,42,0.18);
      --radius-lg: 1.1rem;
      --radius-md: 0.9rem;
      --tap-target: 44px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text","San Francisco","Segoe UI",sans-serif;
    }

    html, body {
      -webkit-text-size-adjust: 100%;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      padding: 0.9rem;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    @media (min-width: 768px) {
      body {
        max-width: 900px;
        margin: 0 auto;
      }
    }

    a {
      color: var(--accent-strong);
      text-decoration: underline;
    }

    button,
    input {
      -webkit-tap-highlight-color: transparent;
    }

    .site-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.9rem;
    }

    .site-header-left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      min-width: 0;
    }

    .site-logo {
      height: 36px;
      width: auto;
      border-radius: 0.5rem;
      object-fit: cover;
      background: #e5e7eb;
      flex-shrink: 0;
    }

    .site-title-block {
      display: flex;
      flex-direction: column;
      gap: 0.08rem;
    }

    .site-title {
      font-size: 1.12rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .site-subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .hero-card {
      background: #fff;
      border-radius: 1rem;
      padding: 1rem;
      border: 1px solid var(--border);
      text-align: center;
    }

    .hero-logo {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 999px;
      margin-bottom: 0.75rem;
      border: 2px solid var(--border);
    }

    .hero-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.7rem;
    }

    .hero-btn,
    .hero-btn-secondary {
      width: 100%;
      max-width: 260px;
      margin: 0.35rem auto;
      display: block;
      padding: 0.6rem 1rem;
      border-radius: 999px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      min-height: var(--tap-target);
      cursor: pointer;
    }

    .hero-btn {
      background: var(--accent);
      color: #fff;
    }

    .hero-btn-secondary {
      background: #e5e7eb;
      color: var(--text);
    }

    .hero-links-row {
      margin-top: 0.75rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
      font-size: 0.9rem;
      flex-wrap: wrap;
    }

    .hero-links-row a {
      text-decoration: underline;
      padding: 0;
      background: none;
      border: none;
      color: var(--accent-strong);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(17,24,39,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 1000;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal-card {
      width: min(100%, 360px);
      background: #fff;
      border-radius: 1.1rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      padding: 1rem;
      text-align: center;
    }

    .modal-title {
      font-size: 1.05rem;
      font-weight: 800;
      margin-bottom: 0.35rem;
    }

    .modal-subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .pin-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.55rem;
      margin-bottom: 0.75rem;
    }

    .pin-bubble {
      height: 58px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .pin-bubble.filled {
      border-color: var(--accent);
      background: var(--accent-soft);
      transform: translateY(-1px);
    }

    .modal-helper {
      min-height: 1.15rem;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 0.9rem;
    }

    .modal-helper.error {
      color: var(--danger);
    }

    .hidden-pin-input {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: 180px;
      height: 56px;
      opacity: 0.01;
      border: 0;
      background: transparent;
      color: transparent;
      caret-color: transparent;
      z-index: 2;
    }

    .modal-actions {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
    }

    .modal-btn {
      min-height: var(--tap-target);
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #f3f4f6;
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 700;
      padding: 0.65rem 1rem;
      cursor: pointer;
      flex: 1;
    }

    .modal-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-left">
      <img src="IMG_7296.jpg" class="site-logo" alt="FTK Classic logo" />
      <div class="site-title-block">
        <div class="site-title">FTK Classic</div>
        <div class="site-subtitle">Powdersville, SC</div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero-card">
      <img src="IMG_7296.jpg" class="hero-logo" alt="FTK Classic" />
      <div class="hero-title">Welcome to the FTK Classic</div>

      <button id="playerBtn" class="hero-btn" type="button">I'm a player</button>
      <button id="spectatorBtn" class="hero-btn-secondary" type="button">I'm a spectator</button>
      <button id="interestBtn" class="hero-btn-secondary" type="button">I'm interested in playing</button>

      <div class="hero-links-row">
        <a href="past_winners.html">Past winners</a>
        <a href="#" id="adminLinkFooter">Admin</a>
      </div>
    </section>
  </main>

  <div id="playerCodeModal" class="modal-backdrop" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="playerCodeTitle">
      <div id="playerCodeTitle" class="modal-title">Enter your player code</div>
      <div class="modal-subtitle">Use your 4-digit code to open your player page.</div>

      <div class="pin-row" id="pinRow" aria-hidden="true"></div>

      <input
        id="playerCodeInput"
        class="hidden-pin-input"
        type="text"
        inputmode="numeric"
        pattern="[0-9]*"
        enterkeyhint="done"
        maxlength="4"
        autocomplete="one-time-code"
        aria-label="Player code"
      />

      <div class="pin-row" id="pinRowVisual" aria-hidden="true">
        <div class="pin-bubble" data-index="0"></div>
        <div class="pin-bubble" data-index="1"></div>
        <div class="pin-bubble" data-index="2"></div>
        <div class="pin-bubble" data-index="3"></div>
      </div>

      <div id="playerCodeMessage" class="modal-helper">Number pad opens automatically on mobile.</div>

      <div class="modal-actions">
        <button id="cancelPlayerCodeBtn" class="modal-btn" type="button">Cancel</button>
        <button id="clearPlayerCodeBtn" class="modal-btn" type="button">Clear</button>
      </div>
    </div>
  </div>

  <script>
    const PLAYER_CODES = {
      "0369": "David Wolf",
      "7022": "Jake Smith",
      "7971": "Jon Wall",
      "9611": "Justin Vaughn",
      "8202": "Will Miller",
      "7377": "Ivan Bolds",
      "2838": "Taylor Harbin",
      "3608": "Eric Tomeo",
      "5327": "Matt Ruff",
      "2303": "Eric Crowe",
      "9724": "Brett Cooper",
      "8817": "Jordan Fiedler",
      "0296": "Michael Godwin",
      "2374": "Tyler Huff",
      "6441": "Phil Nelson",
      "4861": "Steven Hopkins",
      "2563": "Brett Robinson",
      "8171": "Benjamen Newhouse",
      "0508": "Thomas Mull",
      "5752": "Keith Dowling",
      "7954": "Daren Vaughn",
      "1111": "Jason Williamson",
      "2222": "Michael Ogden",
      "3824": "Erik Poole"
    };

    const spectatorBtn = document.getElementById('spectatorBtn');
    const interestBtn = document.getElementById('interestBtn');
    const playerBtn = document.getElementById('playerBtn');
    const adminLinkFooter = document.getElementById('adminLinkFooter');

    const modal = document.getElementById('playerCodeModal');
    const codeInput = document.getElementById('playerCodeInput');
    const codeMessage = document.getElementById('playerCodeMessage');
    const pinBubbles = Array.from(document.querySelectorAll('#pinRowVisual .pin-bubble'));
    const cancelPlayerCodeBtn = document.getElementById('cancelPlayerCodeBtn');
    const clearPlayerCodeBtn = document.getElementById('clearPlayerCodeBtn');

    let autoSubmitTimer = null;

    spectatorBtn.addEventListener('click', function() {
      window.location.href = 'spectator.html';
    });

    interestBtn.addEventListener('click', function() {
      window.location.href = 'https://docs.google.com/forms/d/e/1FAIpQLSeLqfM3XcGEqDBMi6NQ5P8RlbAnYrKS3UnD1f9EdiMmFMbbaQ/viewform';
    });

    playerBtn.addEventListener('click', function() {
      openPlayerCodeModal();
    });

    adminLinkFooter.addEventListener('click', function(e) {
      e.preventDefault();
      goToAdmin();
    });

    cancelPlayerCodeBtn.addEventListener('click', closePlayerCodeModal);


    document.getElementById('pinRowVisual').addEventListener('click', function() {
      focusCodeInput(true);
    });

    document.querySelector('.modal-card').addEventListener('click', function() {
      focusCodeInput(true);
    });

    clearPlayerCodeBtn.addEventListener('click', function() {
      codeInput.value = '';
      renderPinBubbles('');
      setCodeMessage('Number pad opens automatically on mobile.', false);
      focusCodeInput(true);
    });

    modal.addEventListener('click', function(e) {
      if (e.target === modal) {
        closePlayerCodeModal();
      }
    });

    document.addEventListener('keydown', function(e) {
      if (!modal.classList.contains('open')) return;
      if (e.key === 'Escape') closePlayerCodeModal();
    });

    codeInput.addEventListener('input', function() {
      const digitsOnly = codeInput.value.replace(/\D/g, '').slice(0, 4);
      if (codeInput.value !== digitsOnly) {
        codeInput.value = digitsOnly;
      }

      renderPinBubbles(digitsOnly);

      if (digitsOnly.length < 4) {
        if (autoSubmitTimer) {
          clearTimeout(autoSubmitTimer);
          autoSubmitTimer = null;
        }
        setCodeMessage('Number pad opens automatically on mobile.', false);
        return;
      }

      setCodeMessage('Opening player page…', false);
      if (autoSubmitTimer) clearTimeout(autoSubmitTimer);
      autoSubmitTimer = setTimeout(function() {
        submitPlayerCode(digitsOnly);
      }, 180);
    });

    function openPlayerCodeModal() {
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
      codeInput.value = '';
      renderPinBubbles('');
      setCodeMessage('Number pad opens automatically on mobile.', false);
      focusCodeInput(true);
    }

    function closePlayerCodeModal() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
      codeInput.blur();
      if (autoSubmitTimer) {
        clearTimeout(autoSubmitTimer);
        autoSubmitTimer = null;
      }
    }

    function focusCodeInput(immediate) {
      const doFocus = function() {
        try {
          codeInput.removeAttribute('readonly');
          codeInput.focus({ preventScroll: true });
          codeInput.click();
        } catch (e) {
          codeInput.focus();
        }
      };
      if (immediate) {
        doFocus();
      } else {
        setTimeout(doFocus, 50);
      }
    }

    function renderPinBubbles(code) {
      pinBubbles.forEach(function(bubble, index) {
        const digit = code[index] || '';
        bubble.textContent = digit ? '•' : '';
        bubble.classList.toggle('filled', Boolean(digit));
      });
    }

    function setCodeMessage(message, isError) {
      codeMessage.textContent = message;
      codeMessage.classList.toggle('error', Boolean(isError));
    }

    function submitPlayerCode(code) {
      if (!PLAYER_CODES[code]) {
        setCodeMessage('Invalid player code.', true);
        codeInput.value = '';
        renderPinBubbles('');
        focusCodeInput(true);
        return;
      }

      try {
        localStorage.setItem('playerCode', code);
        localStorage.setItem('playerName', PLAYER_CODES[code]);
      } catch (e) {
        // ignore storage errors
      }

      window.location.href = 'player.html?code=' + encodeURIComponent(code);
    }

    function goToAdmin() {
      const pass = prompt('Admin password:');
      if (pass === '3618') window.location.href = 'admin.html';
    }
  </script>
</body>
</html>
