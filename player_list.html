<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FTK Classic – Player List</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="IMG_7296.jpg" />

  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --border: #d1d5db;
      --text: #111827;
      --muted: #6b7280;
      --shadow: 0 14px 40px rgba(15,23,42,0.14);
      --tap: 44px;

      --red: #b91c1c;
      --red-soft: #fef2f2;
      --red-border: #fecaca;

      --blue: #1d4ed8;
      --blue-soft: #eff6ff;
      --blue-border: #bfdbfe;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      padding: 1rem;
      color: var(--text);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      gap: 0.75rem;
    }

    .title {
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      flex: 1;
      padding-left: var(--tap);
    }

    .hamburger {
      height: var(--tap);
      width: var(--tap);
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 0.65rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(15,23,42,0.06);
    }

    .hamburger svg {
      width: 22px;
      height: 22px;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      flex-wrap: wrap;
      margin-bottom: 0.85rem;
    }

    .legend-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 0.7rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 0.88rem;
      font-weight: 700;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
    }

    .legend-red .legend-dot {
      background: var(--red);
    }

    .legend-blue .legend-dot {
      background: var(--blue);
    }

    .legend-neutral .legend-dot {
      background: #9ca3af;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(17,24,39,0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      z-index: 50;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      height: 100%;
      width: min(84vw, 320px);
      background: var(--card);
      border-left: 1px solid var(--border);
      box-shadow: var(--shadow);
      transform: translateX(105%);
      transition: transform 0.22s ease;
      z-index: 60;
      padding: 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .drawer.show {
      transform: translateX(0);
    }

    .drawerHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .drawerTitle {
      font-weight: 800;
      font-size: 1rem;
    }

    .closeBtn {
      height: var(--tap);
      width: var(--tap);
      border: 1px solid var(--border);
      background: #f9fafb;
      border-radius: 0.65rem;
      cursor: pointer;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .nav a {
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      background: #f9fafb;
      border-radius: 0.75rem;
      padding: 0.75rem 0.85rem;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
    }

    .nav a span {
      color: var(--muted);
    }

    .tableWrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      overflow: hidden;
      box-shadow: 0 10px 24px rgba(15,23,42,0.06);
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
    }

    th, td {
      padding: 0.7rem 0.6rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
    }

    th {
      background: #f9fafb;
      font-weight: 700;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    td.hcp {
      text-align: right;
      color: var(--muted);
      width: 90px;
      font-weight: 600;
    }

    td.num {
      width: 42px;
      text-align: right;
      color: var(--muted);
      font-weight: 700;
    }

    td.playerName {
      font-weight: 700;
    }

    tr.team-red {
      background: var(--red-soft);
    }

    tr.team-red td {
      border-bottom-color: var(--red-border);
    }

    tr.team-red td.playerName {
      color: var(--red);
    }

    tr.team-blue {
      background: var(--blue-soft);
    }

    tr.team-blue td {
      border-bottom-color: var(--blue-border);
    }

    tr.team-blue td.playerName {
      color: var(--blue);
    }

    tr.team-red td:first-child,
    tr.team-blue td:first-child {
      box-shadow: inset 4px 0 0 0 currentColor;
    }

    tr.team-red td:first-child {
      color: var(--red);
    }

    tr.team-blue td:first-child {
      color: var(--blue);
    }

    .emptyState {
      padding: 1rem;
      text-align: center;
      color: var(--muted);
      background: #fff;
    }
  </style>
</head>

<body>
  <div id="overlay" class="overlay"></div>

  <aside id="drawer" class="drawer">
    <div class="drawerHeader">
      <div class="drawerTitle">FTK Classic</div>
      <button id="closeDrawer" class="closeBtn">✕</button>
    </div>

    <nav class="nav">
      <a href="index.html">Home <span>›</span></a>
      <a href="spectator.html">Scores <span>›</span></a>
      <a href="photos.html">Photos <span>›</span></a>
    </nav>
  </aside>

  <div class="topbar">
    <div class="title">Player List</div>
    <button id="openDrawer" class="hamburger" aria-label="Open menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M4 6h16"></path>
        <path d="M4 12h16"></path>
        <path d="M4 18h16"></path>
      </svg>
    </button>
  </div>

  <div class="legend" id="teamLegend">
    <div class="legend-chip legend-red">
      <span class="legend-dot"></span>
      <span id="redTeamLegend">Red Team</span>
    </div>
    <div class="legend-chip legend-blue">
      <span class="legend-dot"></span>
      <span id="blueTeamLegend">Blue Team</span>
    </div>
    <div class="legend-chip legend-neutral">
      <span class="legend-dot"></span>
      <span>Unassigned</span>
    </div>
  </div>

  <div class="tableWrap">
    <table class="table">
      <thead>
        <tr>
          <th>#</th>
          <th>Player</th>
          <th style="text-align:right;">Handicap</th>
        </tr>
      </thead>
      <tbody id="playerList">
        <tr>
          <td colspan="3" class="emptyState">Loading players...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD5fk91DPgPBkJ3_xGnNntD3PQbi5Ib3kg",
      authDomain: "ftkclassicdb.firebaseapp.com",
      databaseURL: "https://ftkclassicdb-default-rtdb.firebaseio.com",
      projectId: "ftkclassicdb",
      storageBucket: "ftkclassicdb.firebasestorage.app",
      messagingSenderId: "963469808092",
      appId: "1:963469808092:web:e6e789ce20ef46404b3f19"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const playersRef = ref(db, "players");
    const settingsRef = ref(db, "settings");

    const listEl = document.getElementById("playerList");
    const redTeamLegend = document.getElementById("redTeamLegend");
    const blueTeamLegend = document.getElementById("blueTeamLegend");

    let settings = {};

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function getTeamNames() {
      const t = settings.teamNames || {};
      return {
        red: (t.red || "Red Team").trim(),
        blue: (t.blue || "Blue Team").trim()
      };
    }

    function renderPlayers(rawPlayers) {
      const players = Object.values(rawPlayers || {});
      players.sort((a, b) => {
        const aHcp = parseFloat(a.handicap ?? 999);
        const bHcp = parseFloat(b.handicap ?? 999);
        return aHcp - bHcp;
      });

      if (!players.length) {
        listEl.innerHTML = `
          <tr>
            <td colspan="3" class="emptyState">No players found.</td>
          </tr>
        `;
        return;
      }

      listEl.innerHTML = players.map((p, i) => {
        const team = (p.team === "red" || p.team === "blue") ? p.team : "";
        const rowClass = team ? `team-${team}` : "";
        return `
          <tr class="${rowClass}">
            <td class="num">${i + 1}</td>
            <td class="playerName">${escapeHtml(p.name || "Unknown Player")}</td>
            <td class="hcp">${escapeHtml(p.handicap ?? "N/A")}</td>
          </tr>
        `;
      }).join("");
    }

    onValue(settingsRef, (snap) => {
      settings = snap.val() || {};
      const names = getTeamNames();
      redTeamLegend.textContent = names.red;
      blueTeamLegend.textContent = names.blue;
    });

    onValue(playersRef, (snap) => {
      renderPlayers(snap.val() || {});
    });

    const drawer = document.getElementById("drawer");
    const overlay = document.getElementById("overlay");

    document.getElementById("openDrawer").onclick = () => {
      drawer.classList.add("show");
      overlay.classList.add("show");
    };

    function closeDrawer() {
      drawer.classList.remove("show");
      overlay.classList.remove("show");
    }

    document.getElementById("closeDrawer").onclick = closeDrawer;
    overlay.onclick = closeDrawer;
  </script>
</body>
</html>
