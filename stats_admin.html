<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FTK Classic – Stats Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="IMG_7296.jpg" />

  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --shadow-soft: 0 10px 30px rgba(15,23,42,0.12);
      --green: #16a34a;
      --red: #dc2626;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      padding: 0.75rem;
    }

    @media (min-width: 768px) {
      body {
        max-width: 900px;
        margin: 0 auto;
      }
    }

    .site-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
    }

    .site-header-left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      min-width: 0;
    }

    .site-logo {
      height: 32px;
      width: auto;
      border-radius: 0.45rem;
      object-fit: cover;
      background: #e5e7eb;
      flex-shrink: 0;
    }

    .site-title {
      font-size: 1.05rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .site-subtitle {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .nav-links {
      margin-left: auto;
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-btn {
      font-size: 0.85rem;
      border-radius: 999px;
      padding: 0.3rem 0.9rem;
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
    }

    main {
      margin-top: 0.4rem;
    }

    .card {
      background: var(--card);
      border-radius: 0.9rem;
      padding: 0.85rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .help-text {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.35;
      margin-bottom: 0.85rem;
    }

    .players-list {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .player-card {
      border-radius: 0.9rem;
      border: 2px solid #9ca3af;
      background: #ffffff;
      padding: 0.7rem;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .player-name {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.45rem;
    }

    @media (max-width: 600px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .field label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      font-weight: 600;
    }

    .field input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 0.55rem;
      padding: 0.45rem 0.55rem;
      font-size: 0.95rem;
      background: #f9fafb;
      color: var(--text);
    }

    .field input:focus {
      outline: none;
      border-color: #111827;
      background: #ffffff;
    }

    .player-actions {
      display: flex;
      gap: 0.45rem;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    .save-btn {
      background: var(--green);
      color: #ffffff;
    }

    .reset-btn {
      background: #ffffff;
      color: var(--red);
      border: 1px solid #fecaca;
    }

    .save-all-wrap {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 0.75rem;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .save-all-btn {
      background: #111827;
      color: #ffffff;
    }

    .status {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.65rem;
      min-height: 1rem;
    }

    .status.success {
      color: var(--green);
      font-weight: 600;
    }

    .status.error {
      color: var(--red);
      font-weight: 600;
    }

    .empty-state {
      padding: 1rem;
      text-align: center;
      color: var(--muted);
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="site-header-left">
    <img src="IMG_7296.jpg" class="site-logo" />
    <div>
      <div class="site-title">FTK Classic</div>
      <div class="site-subtitle">Stats admin</div>
    </div>
  </div>

  <div class="nav-links">
    <a href="stats.html" class="nav-btn">Stats</a>
    <a href="spectator.html" class="nav-btn">Scores</a>
    <a href="competitors.html" class="nav-btn">Competitors</a>
    <a href="player.html" class="nav-btn">Player</a>
  </div>
</header>

<main>
  <section class="card">
    <div class="card-title">Manual Stats Editor</div>

    <div class="help-text">
      These numbers are manual additions. They do not erase or change match scorecard data.
      The public stats page adds these values on top of the live match totals.
    </div>

    <div class="save-all-wrap">
      <button class="save-all-btn" id="saveAllBtn">Save All Changes</button>
    </div>

    <div id="playersList" class="players-list">
      <div class="empty-state">Loading…</div>
    </div>

    <div id="status" class="status"></div>
  </section>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
  import {
    getDatabase,
    ref,
    onValue,
    set,
    update,
    remove
  } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD5fk91DPgPBkJ3_xGnNntD3PQbi5Ib3kg",
    authDomain: "ftkclassicdb.firebaseapp.com",
    databaseURL: "https://ftkclassicdb-default-rtdb.firebaseio.com",
    projectId: "ftkclassicdb",
    storageBucket: "ftkclassicdb.firebasestorage.app",
    messagingSenderId: "963469808092",
    appId: "1:963469808092:web:e6e789ce20ef46404b3f19"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const playersRef = ref(db, "players");
  const manualStatsRef = ref(db, "manualStats/players");

  const playersListEl = document.getElementById("playersList");
  const statusEl = document.getElementById("status");
  const saveAllBtn = document.getElementById("saveAllBtn");

  let players = {};
  let manualStats = {};

  let playersLoaded = false;
  let manualStatsLoaded = false;

  function showStatus(message, type = "") {
    statusEl.textContent = message;
    statusEl.className = "status";

    if (type) {
      statusEl.classList.add(type);
    }

    if (message) {
      setTimeout(() => {
        statusEl.textContent = "";
        statusEl.className = "status";
      }, 3000);
    }
  }

  function numberValue(value) {
    const n = parseInt(value, 10);
    return Number.isFinite(n) && n >= 0 ? n : 0;
  }

  function renderAdmin() {
    if (!playersLoaded || !manualStatsLoaded) return;

    const rows = Object.entries(players)
      .map(([id, p]) => ({
        id,
        name: p.name || id,
        holeWins: manualStats[id]?.holeWins || 0,
        matchWins: manualStats[id]?.matchWins || 0,
        tournamentsWon: manualStats[id]?.tournamentsWon || 0
      }))
      .sort((a, b) => a.name.localeCompare(b.name));

    if (!rows.length) {
      playersListEl.innerHTML = `<div class="empty-state">No players found.</div>`;
      return;
    }

    playersListEl.innerHTML = rows.map(p => `
      <article class="player-card" data-player-id="${p.id}">
        <div class="player-name">${p.name}</div>

        <div class="stats-grid">
          <div class="field">
            <label>Holes Won</label>
            <input
              type="number"
              min="0"
              step="1"
              value="${p.holeWins}"
              data-stat="holeWins"
            />
          </div>

          <div class="field">
            <label>Matches Won</label>
            <input
              type="number"
              min="0"
              step="1"
              value="${p.matchWins}"
              data-stat="matchWins"
            />
          </div>

          <div class="field">
            <label>Tournaments Won</label>
            <input
              type="number"
              min="0"
              step="1"
              value="${p.tournamentsWon}"
              data-stat="tournamentsWon"
            />
          </div>
        </div>

        <div class="player-actions">
          <button class="reset-btn" data-action="reset">Reset Manual Stats</button>
          <button class="save-btn" data-action="save">Save Player</button>
        </div>
      </article>
    `).join("");
  }

  function getCardValues(card) {
    const playerId = card.dataset.playerId;

    return {
      playerId,
      holeWins: numberValue(card.querySelector('[data-stat="holeWins"]').value),
      matchWins: numberValue(card.querySelector('[data-stat="matchWins"]').value),
      tournamentsWon: numberValue(card.querySelector('[data-stat="tournamentsWon"]').value)
    };
  }

  async function savePlayer(card) {
    const values = getCardValues(card);

    await set(ref(db, `manualStats/players/${values.playerId}`), {
      holeWins: values.holeWins,
      matchWins: values.matchWins,
      tournamentsWon: values.tournamentsWon
    });

    showStatus("Player stats saved.", "success");
  }

  async function resetPlayer(card) {
    const playerId = card.dataset.playerId;
    const playerName = players[playerId]?.name || "this player";

    const ok = confirm(`Reset manual stats for ${playerName}?`);
    if (!ok) return;

    await remove(ref(db, `manualStats/players/${playerId}`));

    showStatus("Manual stats reset.", "success");
  }

  async function saveAllPlayers() {
    const cards = Array.from(document.querySelectorAll(".player-card"));
    const updates = {};

    for (const card of cards) {
      const values = getCardValues(card);

      updates[`manualStats/players/${values.playerId}`] = {
        holeWins: values.holeWins,
        matchWins: values.matchWins,
        tournamentsWon: values.tournamentsWon
      };
    }

    await update(ref(db), updates);

    showStatus("All manual stats saved.", "success");
  }

  playersListEl.addEventListener("click", async e => {
    const button = e.target.closest("button");
    if (!button) return;

    const card = e.target.closest(".player-card");
    if (!card) return;

    try {
      const action = button.dataset.action;

      if (action === "save") {
        await savePlayer(card);
      }

      if (action === "reset") {
        await resetPlayer(card);
      }
    } catch (err) {
      console.error(err);
      showStatus("Something went wrong. Check the console.", "error");
    }
  });

  saveAllBtn.addEventListener("click", async () => {
    try {
      await saveAllPlayers();
    } catch (err) {
      console.error(err);
      showStatus("Something went wrong saving all stats.", "error");
    }
  });

  onValue(playersRef, snap => {
    players = snap.val() || {};
    playersLoaded = true;
    renderAdmin();
  });

  onValue(manualStatsRef, snap => {
    manualStats = snap.val() || {};
    manualStatsLoaded = true;
    renderAdmin();
  });
</script>

</body>
</html>
