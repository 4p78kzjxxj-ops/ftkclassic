<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FTK Classic – Stats Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="IMG_7296.jpg" />

  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --shadow-soft: 0 10px 30px rgba(15,23,42,0.12);
      --green: #16a34a;
      --red: #dc2626;
      --blue: #2563eb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      padding: 0.75rem;
    }

    @media (min-width: 768px) {
      body {
        max-width: 1000px;
        margin: 0 auto;
      }
    }

    .site-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
    }

    .site-header-left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      min-width: 0;
    }

    .site-logo {
      height: 32px;
      width: auto;
      border-radius: 0.45rem;
      object-fit: cover;
      background: #e5e7eb;
      flex-shrink: 0;
    }

    .site-title {
      font-size: 1.05rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .site-subtitle {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .nav-links {
      margin-left: auto;
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-btn {
      font-size: 0.85rem;
      border-radius: 999px;
      padding: 0.3rem 0.9rem;
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
    }

    main {
      margin-top: 0.4rem;
    }

    .card {
      background: var(--card);
      border-radius: 0.9rem;
      padding: 0.85rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .help-text {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.35;
      margin-bottom: 0.85rem;
    }

    .players-list {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .player-card {
      border-radius: 0.9rem;
      border: 2px solid #9ca3af;
      background: #ffffff;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .player-name {
      font-size: 0.98rem;
      font-weight: 750;
    }

    .stats-table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 0.75rem;
      border: 1px solid #e5e7eb;
    }

    .stats-table th,
    .stats-table td {
      padding: 0.45rem;
      border-bottom: 1px solid #e5e7eb;
      text-align: center;
      font-size: 0.82rem;
    }

    .stats-table th {
      background: #f9fafb;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.68rem;
      letter-spacing: 0.04em;
      font-weight: 700;
    }

    .stats-table tr:last-child td {
      border-bottom: none;
    }

    .stat-label {
      text-align: left !important;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    .calculated-value {
      color: var(--muted);
      font-weight: 700;
    }

    .manual-input {
      width: 72px;
      max-width: 100%;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.35rem;
      font-size: 0.9rem;
      text-align: center;
      background: #ffffff;
      color: var(--text);
    }

    .manual-input:focus {
      outline: none;
      border-color: #111827;
    }

    .total-value {
      color: var(--blue);
      font-weight: 800;
      font-size: 0.9rem;
    }

    .player-actions {
      display: flex;
      gap: 0.45rem;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    .save-btn {
      background: var(--green);
      color: #ffffff;
    }

    .reset-btn {
      background: #ffffff;
      color: var(--red);
      border: 1px solid #fecaca;
    }

    .save-all-wrap {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 0.75rem;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .save-all-btn {
      background: #111827;
      color: #ffffff;
    }

    .status {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.65rem;
      min-height: 1rem;
    }

    .status.success {
      color: var(--green);
      font-weight: 600;
    }

    .status.error {
      color: var(--red);
      font-weight: 600;
    }

    .empty-state {
      padding: 1rem;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      .stats-table th,
      .stats-table td {
        padding: 0.38rem 0.25rem;
        font-size: 0.76rem;
      }

      .stats-table th {
        font-size: 0.62rem;
      }

      .manual-input {
        width: 58px;
        font-size: 0.82rem;
      }

      .nav-btn {
        font-size: 0.78rem;
        padding: 0.28rem 0.65rem;
      }
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="site-header-left">
    <img src="IMG_7296.jpg" class="site-logo" />
    <div>
      <div class="site-title">FTK Classic</div>
      <div class="site-subtitle">Stats admin</div>
    </div>
  </div>

  <div class="nav-links">
    <a href="stats.html" class="nav-btn">Stats</a>
    <a href="spectator.html" class="nav-btn">Scores</a>
    <a href="competitors.html" class="nav-btn">Competitors</a>
    <a href="player.html" class="nav-btn">Player</a>
  </div>
</header>

<main>
  <section class="card">
    <div class="card-title">Manual Stats Editor</div>

    <div class="help-text">
      Calculated numbers come from the current match data. Manual numbers are added on top.
      Final Total is what the stats page should show.
    </div>

    <div class="save-all-wrap">
      <button class="save-all-btn" id="saveAllBtn">Save All Changes</button>
    </div>

    <div id="playersList" class="players-list">
      <div class="empty-state">Loading…</div>
    </div>

    <div id="status" class="status"></div>
  </section>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
  import {
    getDatabase,
    ref,
    onValue,
    set,
    update,
    remove
  } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD5fk91DPgPBkJ3_xGnNntD3PQbi5Ib3kg",
    authDomain: "ftkclassicdb.firebaseapp.com",
    databaseURL: "https://ftkclassicdb-default-rtdb.firebaseio.com",
    projectId: "ftkclassicdb",
    storageBucket: "ftkclassicdb.firebasestorage.app",
    messagingSenderId: "963469808092",
    appId: "1:963469808092:web:e6e789ce20ef46404b3f19"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const playersRef = ref(db, "players");
  const matchesRef = ref(db, "matches");
  const manualStatsRef = ref(db, "manualStats/players");

  const playersListEl = document.getElementById("playersList");
  const statusEl = document.getElementById("status");
  const saveAllBtn = document.getElementById("saveAllBtn");

  let players = {};
  let matches = {};
  let manualStats = {};

  let playersLoaded = false;
  let matchesLoaded = false;
  let manualStatsLoaded = false;

  function showStatus(message, type = "") {
    statusEl.textContent = message;
    statusEl.className = "status";

    if (type) {
      statusEl.classList.add(type);
    }

    if (message) {
      setTimeout(() => {
        statusEl.textContent = "";
        statusEl.className = "status";
      }, 3000);
    }
  }

  function numberValue(value) {
    const n = parseInt(value, 10);
    return Number.isFinite(n) && n >= 0 ? n : 0;
  }

  function computeWinnerColor(matchObj) {
    const holes = matchObj.holes || [];
    let red = 0;
    let blue = 0;

    for (const h of holes) {
      if (h === "red") red++;
      if (h === "blue") blue++;
    }

    if (red === blue) return null;
    return red > blue ? "red" : "blue";
  }

  function getCalculatedStatsForPlayer(playerId) {
    let holesWon = 0;
    let matchesWon = 0;

    for (const [id, m] of Object.entries(matches)) {
      const redP = m.red?.players || [];
      const blueP = m.blue?.players || [];
      let side = null;

      if (redP.includes(playerId)) side = "red";
      if (blueP.includes(playerId)) side = "blue";
      if (!side) continue;

      for (const h of m.holes || []) {
        if (h === side) holesWon++;
      }

      const winningSide = computeWinnerColor(m);
      if (winningSide === side) matchesWon++;
    }

    return {
      holeWins: holesWon,
      matchWins: matchesWon,
      tournamentsWon: 0
    };
  }

  function renderAdmin() {
    if (!playersLoaded || !matchesLoaded || !manualStatsLoaded) return;

    const rows = Object.entries(players)
      .map(([id, p]) => {
        const calculated = getCalculatedStatsForPlayer(id);
        const manual = manualStats[id] || {};

        return {
          id,
          name: p.name || id,

          calculatedHoleWins: calculated.holeWins,
          calculatedMatchWins: calculated.matchWins,
          calculatedTournamentsWon: calculated.tournamentsWon,

          manualHoleWins: manual.holeWins || 0,
          manualMatchWins: manual.matchWins || 0,
          manualTournamentsWon: manual.tournamentsWon || 0,

          totalHoleWins: calculated.holeWins + (manual.holeWins || 0),
          totalMatchWins: calculated.matchWins + (manual.matchWins || 0),
          totalTournamentsWon: calculated.tournamentsWon + (manual.tournamentsWon || 0)
        };
      })
      .sort((a, b) => {
        if (b.totalHoleWins !== a.totalHoleWins) return b.totalHoleWins - a.totalHoleWins;
        if (b.totalMatchWins !== a.totalMatchWins) return b.totalMatchWins - a.totalMatchWins;
        if (b.totalTournamentsWon !== a.totalTournamentsWon) return b.totalTournamentsWon - a.totalTournamentsWon;
        return a.name.localeCompare(b.name);
      });

    if (!rows.length) {
      playersListEl.innerHTML = `<div class="empty-state">No players found.</div>`;
      return;
    }

    playersListEl.innerHTML = rows.map(p => `
      <article class="player-card" data-player-id="${p.id}">
        <div class="player-name">${p.name}</div>

        <table class="stats-table">
          <thead>
            <tr>
              <th></th>
              <th>Calculated</th>
              <th>Manual</th>
              <th>Final Total</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td class="stat-label">Holes Won</td>
              <td class="calculated-value">${p.calculatedHoleWins}</td>
              <td>
                <input
                  class="manual-input"
                  type="number"
                  min="0"
                  step="1"
                  value="${p.manualHoleWins}"
                  data-stat="holeWins"
                />
              </td>
              <td class="total-value" data-total="holeWins">${p.totalHoleWins}</td>
            </tr>

            <tr>
              <td class="stat-label">Matches Won</td>
              <td class="calculated-value">${p.calculatedMatchWins}</td>
              <td>
                <input
                  class="manual-input"
                  type="number"
                  min="0"
                  step="1"
                  value="${p.manualMatchWins}"
                  data-stat="matchWins"
                />
              </td>
              <td class="total-value" data-total="matchWins">${p.totalMatchWins}</td>
            </tr>

            <tr>
              <td class="stat-label">Tournaments Won</td>
              <td class="calculated-value">${p.calculatedTournamentsWon}</td>
              <td>
                <input
                  class="manual-input"
                  type="number"
                  min="0"
                  step="1"
                  value="${p.manualTournamentsWon}"
                  data-stat="tournamentsWon"
                />
              </td>
              <td class="total-value" data-total="tournamentsWon">${p.totalTournamentsWon}</td>
            </tr>
          </tbody>
        </table>

        <div class="player-actions">
          <button class="reset-btn" data-action="reset">Reset Manual Stats</button>
          <button class="save-btn" data-action="save">Save Player</button>
        </div>
      </article>
    `).join("");
  }

  function updateCardTotals(card) {
    const playerId = card.dataset.playerId;
    const calculated = getCalculatedStatsForPlayer(playerId);

    const manualHoleWins = numberValue(card.querySelector('[data-stat="holeWins"]').value);
    const manualMatchWins = numberValue(card.querySelector('[data-stat="matchWins"]').value);
    const manualTournamentsWon = numberValue(card.querySelector('[data-stat="tournamentsWon"]').value);

    card.querySelector('[data-total="holeWins"]').textContent = calculated.holeWins + manualHoleWins;
    card.querySelector('[data-total="matchWins"]').textContent = calculated.matchWins + manualMatchWins;
    card.querySelector('[data-total="tournamentsWon"]').textContent = calculated.tournamentsWon + manualTournamentsWon;
  }

  function getCardValues(card) {
    const playerId = card.dataset.playerId;

    return {
      playerId,
      holeWins: numberValue(card.querySelector('[data-stat="holeWins"]').value),
      matchWins: numberValue(card.querySelector('[data-stat="matchWins"]').value),
      tournamentsWon: numberValue(card.querySelector('[data-stat="tournamentsWon"]').value)
    };
  }

  async function savePlayer(card) {
    const values = getCardValues(card);

    await set(ref(db, `manualStats/players/${values.playerId}`), {
      holeWins: values.holeWins,
      matchWins: values.matchWins,
      tournamentsWon: values.tournamentsWon
    });

    showStatus("Player stats saved.", "success");
  }

  async function resetPlayer(card) {
    const playerId = card.dataset.playerId;
    const playerName = players[playerId]?.name || "this player";

    const ok = confirm(`Reset manual stats for ${playerName}?`);
    if (!ok) return;

    await remove(ref(db, `manualStats/players/${playerId}`));

    showStatus("Manual stats reset.", "success");
  }

  async function saveAllPlayers() {
    const cards = Array.from(document.querySelectorAll(".player-card"));
    const updates = {};

    for (const card of cards) {
      const values = getCardValues(card);

      updates[`manualStats/players/${values.playerId}`] = {
        holeWins: values.holeWins,
        matchWins: values.matchWins,
        tournamentsWon: values.tournamentsWon
      };
    }

    await update(ref(db), updates);

    showStatus("All manual stats saved.", "success");
  }

  playersListEl.addEventListener("input", e => {
    if (!e.target.matches(".manual-input")) return;

    const card = e.target.closest(".player-card");
    if (!card) return;

    updateCardTotals(card);
  });

  playersListEl.addEventListener("click", async e => {
    const button = e.target.closest("button");
    if (!button) return;

    const card = e.target.closest(".player-card");
    if (!card) return;

    try {
      const action = button.dataset.action;

      if (action === "save") {
        await savePlayer(card);
      }

      if (action === "reset") {
        await resetPlayer(card);
      }
    } catch (err) {
      console.error(err);
      showStatus("Something went wrong. Check the console.", "error");
    }
  });

  saveAllBtn.addEventListener("click", async () => {
    try {
      await saveAllPlayers();
    } catch (err) {
      console.error(err);
      showStatus("Something went wrong saving all stats.", "error");
    }
  });

  onValue(playersRef, snap => {
    players = snap.val() || {};
    playersLoaded = true;
    renderAdmin();
  });

  onValue(matchesRef, snap => {
    matches = snap.val() || {};
    matchesLoaded = true;
    renderAdmin();
  });

  onValue(manualStatsRef, snap => {
    manualStats = snap.val() || {};
    manualStatsLoaded = true;
    renderAdmin();
  });
</script>

</body>
</html>
